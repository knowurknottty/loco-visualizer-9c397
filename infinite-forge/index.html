<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCO Visualizer – Infinite Forge</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
<style>
/* Global styling */
body {
  background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
  color: #fff;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}
/* Hexagon shape */
.hex {
  width: 120px;
  height: 69.28px;
  position: relative;
  margin: 15px;
  cursor: pointer;
  transition: transform 0.3s;
}
.hex:before,
.hex:after {
  content: "";
  position: absolute;
  width: 0;
  border-left: 60px solid transparent;
  border-right: 60px solid transparent;
}
.hex:before {
  bottom: 100%;
  border-bottom: 34.64px solid;
}
.hex:after {
  top: 100%;
  border-top: 34.64px solid;
}
.hex-inner {
  width: 120px;
  height: 69.28px;
  background: #1c1c1c;
  position: absolute;
  top: 0;
  left: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  color: #fff;
}
.hex.active .hex-inner {
  background: var(--active-color);
  animation: pulse 1s infinite alternate;
}
@keyframes pulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.1); }
}
/* Panel layout */
#app {
  height: 100vh;
}
.panel {
  padding: 10px;
  overflow: auto;
}
.input-panel { flex-basis: 25%; }
.processing-panel { flex-basis: 50%; }
.output-panel { flex-basis: 25%; }
/* Button */
.btn {
  background: #00d4ff;
  color: #000;
  padding: 10px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #00b3c8; }
/* Data flow line */
svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.line {
  stroke: #00d4ff;
  stroke-width: 2;
  fill: none;
  stroke-dasharray: 5,5;
  animation: dash 2s linear infinite;
}
@keyframes dash {
  to { stroke-dashoffset: -10; }
}
/* Responsive */
@media (max-width: 768px) {
  .panel {
    flex-basis: 100%;
  }
  .processing-panel { flex-basis: 100%; }
}
</style>
</head>
<body>
<div id="app" class="flex flex-row h-full">
  <div class="panel input-panel bg-gray-800">
    <h2 class="text-lg font-semibold mb-2">Input</h2>
    <p>Data input area. Future integration placeholder.</p>
  </div>
  <div class="panel processing-panel bg-gray-900 relative" id="processing">
    <h2 class="text-lg font-semibold mb-2">Processing</h2>
    <div id="modules" class="flex flex-wrap justify-center"></div>
    <button id="runBtn" class="btn mt-4">Run Introspection</button>
  </div>
  <div class="panel output-panel bg-gray-800">
    <h2 class="text-lg font-semibold mb-2">Output</h2>
    <p>Results will appear here.</p>
  </div>
  <svg id="flowSvg"></svg>
</div>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
const { useState, useEffect } = React;
const modulesData = [
  {id:'NEDA', name:'Neuromorphic Event-Driven Activation', color:'#ff6b6b'},
  {id:'HMC', name:'Holographic Memory Compression', color:'#6bffb8'},
  {id:'QIPC', name:'Quantum-Inspired Probabilistic Consensus', color:'#6b8fff'},
  {id:'CIG', name:'Causal Inference Graph', color:'#ff6bc7'},
  {id:'PCFE', name:'Probabilistic Causal Forecasting Engine', color:'#6bff6b'},
  {id:'HDR', name:'High-Definition Recorder', color:'#ffb86b'},
  {id:'TSCC', name:'Temporal Sequence Causal Coherence', color:'#ff6bff'},
  {id:'NEUR', name:'Neural Unit Registry', color:'#6bffff'},
  {id:'MFO', name:'Meta-Future Optimizer', color:'#ffd46b'},
  {id:'SWC', name:'Swarm Workflow Coordinator', color:'#6bffd4'},
  {id:'SEM', name:'Semantic Encoder Module', color:'#ff6b6b'},
  {id:'SCF', name:'State-Centric Filter', color:'#6b6bff'},
  {id:'ITC', name:'Integration Temporal Conduit', color:'#ffb86b'},
  {id:'ZKC', name:'Zero-Knowledge Compiler', color:'#6bff6b'},
  {id:'FSR', name:'Future State Resolver', color:'#ffd46b'},
  {id:'RCT', name:'Recursive Causal Transformer', color:'#6bffd4'}
];

const App = () => {
  const [activeId, setActiveId] = useState(null);
  const [flowData, setFlowData] = useState([]);
  const svg = d3.select('#flowSvg');

  useEffect(() => {
    const moduleElements = document.querySelectorAll('.hex');
    const positions = Array.from(moduleElements).map(el => {
      const rect = el.getBoundingClientRect();
      return {x: rect.left + rect.width/2 + window.scrollX, y: rect.top + rect.height/2 + window.scrollY};
    });
    const lines = svg.selectAll('.line').data(positions);
    lines.enter().append('line').attr('class','line')
      .attr('x1', d=>d.x).attr('y1', d=>d.y)
      .attr('x2', d=>d.x).attr('y2', d=>d.y);
    lines.attr('x1', d=>d.x).attr('y1', d=>d.y)
      .attr('x2', d=>d.x).attr('y2', d=>d.y);
    lines.exit().remove();
  }, [flowData]);

  const runSequence = async () => {
    for (const mod of modulesData) {
      setActiveId(mod.id);
      await new Promise(r=>setTimeout(r, 500));
    }
    setActiveId(null);
  };

  return null;
};

// Render modules
const Module = ({mod}) => {
  const isActive = React.useState(mod.id)[0] === React.useState(mod.id)[0];
  return React.createElement('div', {
    className: `hex ${isActive?'active':''}`,
    style: {'--active-color': mod.color}
  },
  React.createElement('div', {
    className: 'hex-inner',
    style: {backgroundColor: mod.color}
  }, mod.id)
  );
};

ReactDOM.createRoot(document.getElementById('modules')).render(
  React.createElement('div', null,
    modulesData.map(mod => React.createElement(Module, {key:mod.id, mod}))
  )
);

document.getElementById('runBtn').addEventListener('click', () => {
  // Simple sequential highlight
  let index=0;
  const interval = setInterval(()=>{
    modulesData.forEach((m,i)=>{ const el=document.querySelector(`.hex[data-id="${m.id}"]`); if(el){ el.classList.toggle('active', i===index); }});
    index++;
    if(index>=modulesData.length){ clearInterval(interval); }
  }, 500);
});
</script>
</body>
</html>
