<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCO Visualizer — Infinite Forge</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo { font-size: 3rem; font-weight: 900; color: #00d4ff; margin-bottom: 1rem; }
        .subtitle { color: #8892b0; letter-spacing: 4px; text-transform: uppercase; }
        .construction {
            margin-top: 2rem;
            padding: 2rem;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            text-align: center;
        }
        .back { margin-top: 2rem; color: #64ffda; text-decoration: none; }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="logo">🔷 INFINITE FORGE</div>
    <div class="subtitle">Under Construction</div>
    <div class="construction">
        <p>This variant is being built with React 18 + D3.js</p>
        <p>Check back soon for the full LOCO visualization experience.</p>
    </div>
    <a href="/" class="back">← Back to Title Page</a>
</body>
</html>
