<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCO Visualizer — Nexus Claw</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0a1a 50%, #2e0a1a 100%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo { font-size: 3rem; font-weight: 900; color: #ff006e; margin-bottom: 1rem; text-shadow: 0 0 30px rgba(255, 0, 110, 0.5); }
        .subtitle { color: #8892b0; letter-spacing: 4px; text-transform: uppercase; }
        .construction {
            margin-top: 2rem;
            padding: 2rem;
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid rgba(255, 0, 110, 0.3);
            border-radius: 10px;
            text-align: center;
        }
        .back { margin-top: 2rem; color: #ff4d9e; text-decoration: none; }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="logo">⚡ NEXUS CLAW</div>
    <div class="subtitle">Under Construction</div>
    <div class="construction">
        <p>This variant is being built with Vue 3 + ECharts</p>
        <p>Check back soon for the cyberpunk LOCO visualization experience.</p>
    </div>
    <a href="/" class="back">← Back to Title Page</a>
</body>
</html>
